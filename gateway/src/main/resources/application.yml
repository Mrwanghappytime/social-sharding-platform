server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # Facade Service - all /api/** requests
        - id: facade-service
          uri: lb://facade-service
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1

        # File requests - route to facade which proxies to file-service
        - id: facade-files
          uri: lb://facade-service
          predicates:
            - Path=/files/**
          filters:
            - StripPrefix=0
  nacos:
    discovery:
      enabled: true
      server-addr: 127.0.0.1:8848
      namespace: public
      group: DEFAULT_GROUP

# JWT Configuration
jwt:
  secret: social-sharing-platform-secret-key-change-in-production
  expiration: 86400000

# Dubbo Configuration
dubbo:
  registry:
    address: nacos://127.0.0.1:8848
  consumer:
    check: false
  provider:
    timeout: 5000

# Logging Configuration
logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    com.social.gateway: DEBUG
  log-path: ${LOG_PATH:logs}

# Service info for logging (can be overridden by environment)
service:
  name: gateway
  ip: ${HOST_IP:127.0.0.1}
  port: 8080
