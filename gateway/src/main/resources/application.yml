server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # User Service
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1

        # Post Service
        - id: post-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/posts/**
          filters:
            - StripPrefix=1

        # Interactions (Likes/Comments) - routed to interaction-service
        - id: interaction-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/interactions/**
          filters:
            - StripPrefix=1

        # Relation Service (Followers/Following)
        - id: relation-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/relations/**
          filters:
            - StripPrefix=1

        # Notification Service
        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1

        # File Service
        - id: file-service
          uri: http://localhost:8086
          predicates:
            - Path=/files/**

        # File Service API (for uploads)
        - id: file-service-api
          uri: http://localhost:8086
          predicates:
            - Path=/api/files/**
          filters:
            - StripPrefix=1

      # WebSocket routing to notification-service
      websocket:
        routes:
          - id: notification-websocket
            uri: ws://localhost:8085
            predicates:
              - Path=/ws/notify/**

  nacos:
    discovery:
      enabled: true
      server-addr: 127.0.0.1:8848
      namespace: public
      group: DEFAULT_GROUP

  # Redis Configuration for Pub/Sub
  data:
    redis:
      host: localhost
      port: 6379
      password: root
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# JWT Configuration
jwt:
  secret: social-sharing-platform-secret-key-change-in-production
  expiration: 86400000

# Dubbo Configuration
dubbo:
  registry:
    address: nacos://127.0.0.1:8848
  consumer:
    check: false
  provider:
    timeout: 5000

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.social.gateway: DEBUG
